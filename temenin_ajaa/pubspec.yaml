name: temenin_ajaa
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  flutter_animate: ^4.5.2
  google_fonts: ^6.2.1
  http: ^1.1.0
  go_router: ^13.0.0
  share_plus: ^7.0.0
  url_launcher: ^6.2.5
  provider: ^6.0.5
  supabase_flutter: ^2.0.0
  
  # Cupertino Icons (optional)
  cupertino_icons: ^1.0.6
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_project_structure: ^2.0.4

flutter:
  uses-material-design: true

fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800
  
 